<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家庭心流语录 - Stable</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI';margin:0;background:#f5f4f0}
.wrap{max-width:760px;margin:auto;padding:16px}

#bar{
  position:fixed;top:0;left:0;right:0;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#fff;
  background:#666;
}

.ok{background:#2e7d32}
.err{background:#c62828}
.sync{background:#444}

.card{
  background:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="bar">IDLE</div>

<div class="wrap">
<h2>家庭心流语录（Stable）</h2>
<button onclick="addQuote()">＋添加金句</button>
<div id="list"></div>
</div>

<script>

/* =========================
   数据层（工业级）
========================= */
let DB = {
  v: 1,
  Q: [],
  M: [],
  cfg: {},
  liked: []
};

/* =========================
   GIST
========================= */
const GIST = {
  id: "bcf42fce664d7758ee879c451cae7bb0",
  file: "family-flow.json",
  token: "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",
  lock:false
};

/* =========================
   状态
========================= */
function setBar(type,text){
  const b = document.getElementById("bar");
  b.className = type;
  b.innerText = text;
}

/* =========================
   安全解析（核心）
========================= */
function safeParse(str){
  try{
    if(!str) return null;
    const obj = JSON.parse(str);

    if(typeof obj !== "object") return null;

    return {
      v: obj.v || 1,
      Q: Array.isArray(obj.Q)?obj.Q:[],
      M: Array.isArray(obj.M)?obj.M:[],
      cfg: obj.cfg || {},
      liked: Array.isArray(obj.liked)?obj.liked:[]
    };

  }catch(e){
    console.log("parse fail",e);
    return null;
  }
}

/* =========================
   渲染
========================= */
function render(){
  document.getElementById("list").innerHTML =
    DB.Q.map(q=>`
      <div class="card">${q.text}</div>
    `).join("");
}

/* =========================
   添加
========================= */
function addQuote(){
  const t = prompt("输入金句");
  if(!t) return;

  DB.Q.unshift({
    id:Date.now(),
    text:t,
    ts:Date.now()
  });

  save();
  render();
}

/* =========================
   SAVE
========================= */
function save(){
  localStorage.setItem("db",JSON.stringify(DB));
  push();
}

/* =========================
   PUSH（不会污染云端）
========================= */
async function push(){
  if(GIST.lock) return;
  GIST.lock = true;

  setBar("sync","SYNCING");

  try{
    const res = await fetch(`https://api.github.com/gists/${GIST.id}`,{
      method:"PATCH",
      headers:{
        "Authorization":`token ${GIST.token}`,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        files:{
          [GIST.file]:{
            content:JSON.stringify(DB,null,2)
          }
        }
      })
    });

    if(!res.ok){
      setBar("err","HTTP "+res.status);
      GIST.lock=false;
      return;
    }

    setBar("ok","SYNC OK");

  }catch(e){
    setBar("err","NETWORK");
  }

  setTimeout(()=>GIST.lock=false,1200);
}

/* =========================
   PULL（工业级修复）
========================= */
async function pull(){
  try{
    setBar("sync","LOADING");

    const res = await fetch(`https://api.github.com/gists/${GIST.id}`);

    if(!res.ok){
      setBar("err","HTTP "+res.status);
      return;
    }

    const data = await res.json();

    const file = data.files?.[GIST.file];

    const parsed = safeParse(file?.content);

    if(!parsed){
      setBar("err","CORRUPTED DATA");
      return;
    }

    /* =====================
       Merge策略（核心）
    ===================== */
    DB.Q = merge(DB.Q, parsed.Q);

    DB.M = parsed.M;
    DB.cfg = parsed.cfg;
    DB.liked = parsed.liked;

    render();

    setBar("ok","SYNC OK");

  }catch(e){
    console.log(e);
    setBar("err","OFFLINE");
  }
}

/* =========================
   合并算法（工业关键）
========================= */
function merge(local,remote){
  const map = new Map();

  [...local,...remote].forEach(i=>{
    map.set(i.id,i);
  });

  return [...map.values()];
}

/* =========================
   INIT（云优先）
========================= */
function init(){
  const local = localStorage.getItem("db");

  if(local){
    const parsed = safeParse(local);
    if(parsed) DB = parsed;
  }

  render();
  pull();
}

init();

</script>

</body>
</html>
