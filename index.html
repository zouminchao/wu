<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家庭心流语录 - Final</title>

<style>
body{margin:0;font-family:-apple-system;background:#f5f4f0}
.wrap{max-width:760px;margin:auto;padding:16px}

#bar{
  position:fixed;top:0;left:0;right:0;
  height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#fff;background:#666;
}

.ok{background:#2e7d32}
.err{background:#c62828}
.sync{background:#444}

.card{
  background:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="bar">INIT</div>

<div class="wrap">
<h2>家庭心流语录（Final Stable）</h2>
<button onclick="addQuote()">＋添加金句</button>
<div id="list"></div>
</div>

<script>

/* =========================
   DB（永远合法结构）
========================= */
let DB = createEmpty();

/* =========================
   GIST
========================= */
const GIST = {
  id: "bcf42fce664d7758ee879c451cae7bb0",
  file: "family-flow.json",
  token: "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",
  lock:false
};

/* =========================
   安全初始化结构
========================= */
function createEmpty(){
  return {
    v:1,
    Q:[],
    M:[],
    cfg:{},
    liked:[]
  };
}

/* =========================
   UI状态
========================= */
function setBar(type,text){
  const b=document.getElementById("bar");
  b.className=type;
  b.innerText=text;
}

/* =========================
   超级安全解析（核心）
========================= */
function normalize(raw){
  try{

    let obj = {};

    if(!raw || typeof raw !== "string"){
      obj = {};
    }else{
      try{
        obj = JSON.parse(raw);
      }catch(e){
        console.log("JSON BROKEN → fallback");
        obj = {};
      }
    }

    // 强制结构修复（核心）
    return {
      v: obj.v || 1,
      Q: Array.isArray(obj.Q) ? obj.Q : [],
      M: Array.isArray(obj.M) ? obj.M : [],
      cfg: obj.cfg || {},
      liked: Array.isArray(obj.liked) ? obj.liked : []
    };

  }catch(e){
    console.log("HARD FAIL",e);
    return createEmpty();
  }
}

/* =========================
   合并（防冲突）
========================= */
function merge(local,remote){
  const map = new Map();

  [...local.Q,...remote.Q].forEach(i=>{
    if(i?.id) map.set(i.id,i);
  });

  return {
    ...local,
    Q:[...map.values()],
    M:remote.M,
    cfg:remote.cfg,
    liked:remote.liked
  };
}

/* =========================
   渲染
========================= */
function render(){
  document.getElementById("list").innerHTML =
    DB.Q.map(q=>`
      <div class="card">${q.text}</div>
    `).join("");
}

/* =========================
   添加
========================= */
function addQuote(){
  const t=prompt("输入金句");
  if(!t) return;

  DB.Q.unshift({
    id:Date.now(),
    text:t,
    ts:Date.now()
  });

  save();
  render();
}

/* =========================
   SAVE
========================= */
function save(){
  localStorage.setItem("db",JSON.stringify(DB));
  push();
}

/* =========================
   PUSH（安全版）
========================= */
async function push(){
  if(GIST.lock) return;
  GIST.lock=true;

  setBar("sync","SYNC...");

  try{
    const res=await fetch(`https://api.github.com/gists/${GIST.id}`,{
      method:"PATCH",
      headers:{
        "Authorization":`token ${GIST.token}`,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        files:{
          [GIST.file]:{
            content:JSON.stringify(DB,null,2)
          }
        }
      })
    });

    if(!res.ok){
      setBar("err","HTTP "+res.status);
      GIST.lock=false;
      return;
    }

    setBar("ok","SYNC OK");

  }catch(e){
    setBar("err","NETWORK");
  }

  setTimeout(()=>GIST.lock=false,1000);
}

/* =========================
   PULL（Final稳定核心）
========================= */
async function pull(){
  try{

    setBar("sync","LOADING");

    const res=await fetch(`https://api.github.com/gists/${GIST.id}`);

    if(!res.ok){
      setBar("err","HTTP "+res.status);
      return;
    }

    const data=await res.json();
    const file=data.files?.[GIST.file];

    const remote=normalize(file?.content);

    /* 永远不拒绝数据，只修复 */
    DB = merge(DB,remote);

    render();

    setBar("ok","SYNC OK");

  }catch(e){
    console.log(e);
    setBar("err","OFFLINE");
  }
}

/* =========================
   INIT
========================= */
function init(){
  const local=localStorage.getItem("db");

  if(local){
    DB = normalize(local);
  }

  render();
  pull();
}

init();

</script>

</body>
</html>
